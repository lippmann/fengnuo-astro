name: Sync Social Feeds

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync all social platforms
        env:
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        working-directory: scripts
        run: python sync_all.py

      - name: Save refreshed WeRead cookie back to Secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "[weread] GH_PAT not set, skipping secret update"
          elif [ -f /tmp/weread_cookie_updated.txt ]; then
            NEW_COOKIE=$(cat /tmp/weread_cookie_updated.txt)
            gh secret set WEREAD_COOKIE --body "$NEW_COOKIE" --repo ${{ github.repository }}
            echo "[weread] WEREAD_COOKIE secret updated"
          else
            echo "[weread] no refreshed cookie found, skipping secret update"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/feed.json public/images/
          git diff --cached --quiet || git commit -m "sync: update feed.json and images"
          git push
